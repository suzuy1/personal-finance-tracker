<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemulihan Akun | FinTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>body { font-family: 'Urbanist', sans-serif; }</style>
</head>
<body class="bg-slate-950 text-slate-100 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md p-8 bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl space-y-6">
        <div>
            <h2 class="text-xl font-bold text-white text-center">Pemulihan Akun (Demo Mode)</h2>
            <p class="text-sm text-slate-400 text-center mt-1">Masukkan email terdaftar untuk mengubah password secara instan.</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="p-4 text-sm text-rose-400 bg-rose-500/10 border border-rose-500/20 rounded-xl">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('forgot_password') }}" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Alamat Email Anda</label>
                <input type="email" name="email" required class="block w-full p-3 bg-slate-950 border border-slate-800 rounded-xl text-white focus:outline-none focus:border-emerald-500 transition" placeholder="nama@email.com">
            </div>
            <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold p-3 rounded-xl transition">
                Verifikasi & Lanjut Ubah Password
            </button>
        </form>

        <div class="text-center">
            <a href="{{ url_for('auth_page') }}" class="text-sm text-slate-400 hover:text-white transition">
                <i class="fa-solid fa-arrow-left text-xs mr-1"></i> Kembali ke Login
            </a>
        </div>
    </div>

</body>
</html>

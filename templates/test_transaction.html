<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Transaksi Demo | FinTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Urbanist', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 antialiased dark">

    <aside id="sidebar" class="fixed top-0 left-0 z-40 w-64 h-screen transition-transform -translate-x-full sm:translate-x-0 border-r border-slate-800 bg-slate-900">
        <div class="h-full px-4 py-6 overflow-y-auto flex flex-col justify-between">
            <div>
                <div class="flex items-center gap-3 px-2 mb-8">
                    <div class="p-2 bg-emerald-500/10 text-emerald-400 rounded-lg">
                        <i class="fa-solid fa-wallet text-xl"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tight text-white">FinTrack<span class="text-emerald-400">.</span></span>
                </div>
                <ul class="space-y-2 font-medium">
                    <li>
                        <a href="#" class="flex items-center p-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl group transition">
                            <i class="fa-solid fa-chart-pie w-5 text-lg"></i>
                            <span class="ms-3">Dashboard</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="flex items-center p-3 text-emerald-400 bg-emerald-500/10 rounded-xl group">
                            <i class="fa-solid fa-money-bill-transfer w-5 text-lg"></i>
                            <span class="ms-3">Transaksi</span>
                        </a>
                    </li>
                </ul>
            </div>
            <div class="p-2 border-t border-slate-800 pt-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-full bg-emerald-500 flex items-center justify-center font-bold text-slate-950">MO</div>
                    <div>
                        <p class="text-sm font-semibold text-white">M. Oriza</p>
                        <p class="text-xs text-slate-400">User Active</p>
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <div class="p-4 sm:ml-64 min-h-screen bg-slate-950">
        <main class="p-4 max-w-7xl mx-auto space-y-6">
            
            <div class="max-w-2xl mx-auto pt-4">
                <a href="#" class="inline-flex items-center gap-2 text-sm text-slate-400 hover:text-emerald-400 transition mb-4">
                    <i class="fa-solid fa-arrow-left"></i> Kembali ke Dashboard
                </a>
                
                <div class="p-8 bg-slate-900 border border-slate-800 rounded-2xl shadow-xl space-y-6">
                    <div>
                        <h2 class="text-2xl font-bold text-white tracking-tight">Catat Transaksi Baru</h2>
                        <p class="text-sm text-slate-400 mt-1">Silakan masukkan detail pemasukan atau pengeluaran Anda dengan benar.</p>
                    </div>

                    <form action="#" method="POST" class="space-y-5">
                        <div>
                            <label class="block text-sm font-semibold text-slate-300 mb-2">Jenis Transaksi</label>
                            <div class="grid grid-cols-2 gap-4">
                                <label class="flex items-center justify-center gap-2 p-3.5 bg-slate-950 border border-slate-800 rounded-xl cursor-pointer hover:border-emerald-500/50 has-[:checked]:border-emerald-500 has-[:checked]:bg-emerald-500/10 transition group">
                                    <input type="radio" name="type" value="income" class="hidden" checked>
                                    <i class="fa-solid fa-circle-arrow-down text-emerald-400"></i>
                                    <span class="text-sm font-medium text-slate-300 group-hover:text-white">Pemasukan (Income)</span>
                                </label>
                                
                                <label class="flex items-center justify-center gap-2 p-3.5 bg-slate-950 border border-slate-800 rounded-xl cursor-pointer hover:border-rose-500/50 has-[:checked]:border-rose-500 has-[:checked]:bg-rose-500/10 transition group">
                                    <input type="radio" name="type" value="expense" class="hidden">
                                    <i class="fa-solid fa-circle-arrow-up text-rose-400"></i>
                                    <span class="text-sm font-medium text-slate-300 group-hover:text-white">Pengeluaran (Expense)</span>
                                </label>
                            </div>
                        </div>

                        <div>
                            <label for="amount" class="block text-sm font-semibold text-slate-300 mb-2">Nominal (Rp)</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 start-0 flex items-center ps-4 pointer-events-none text-slate-500 font-bold">Rp</div>
                                <input type="number" id="amount" name="amount" required class="block w-full p-3.5 ps-12 bg-slate-950 border border-slate-800 rounded-xl text-white placeholder-slate-600 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition" placeholder="Contoh: 50000">
                            </div>
                        </div>

                        <div>
                            <label for="category" class="block text-sm font-semibold text-slate-300 mb-2">Kategori</label>
                            <select id="category" name="category_id" required class="block w-full p-3.5 bg-slate-950 border border-slate-800 rounded-xl text-white focus:outline-none focus:border-emerald-500 transition">
                                <option value="" disabled selected class="text-slate-600">Pilih Kategori--</option>
                                <option value="1">💰 Gaji / Pendapatan</option>
                                <option value="2">🍔 Makanan & Minuman</option>
                                <option value="3">🚗 Transportasi</option>
                                <option value="4">🍿 Hiburan / Kebutuhan Hobi</option>
                            </select>
                        </div>

                        <div>
                            <label for="description" class="block text-sm font-semibold text-slate-300 mb-2">Keterangan / Catatan</label>
                            <textarea id="description" name="description" rows="3" class="block w-full p-3.5 bg-slate-950 border border-slate-800 rounded-xl text-white placeholder-slate-600 focus:outline-none focus:border-emerald-500 transition" placeholder="Beli bakso urat pedas..."></textarea>
                        </div>

                        <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold p-3.5 rounded-xl transition shadow-lg shadow-emerald-500/10">
                            Simpan Catatan Keuangan
                        </button>
                    </form>
                </div>
            </div>

        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
</body>
</html>

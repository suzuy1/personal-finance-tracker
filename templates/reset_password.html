<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atur Ulang Password | FinTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Urbanist', sans-serif; }</style>
</head>
<body class="bg-slate-950 text-slate-100 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md p-8 bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl space-y-6">
        <div>
            <h2 class="text-xl font-bold text-white text-center">Atur Ulang Password</h2>
            <p class="text-sm text-slate-400 text-center mt-1">Akun terverifikasi untuk <span class="text-emerald-400 font-semibold">{{ email }}</span>. Silakan masukkan password baru Anda.</p>
        </div>

        <form action="{{ url_for('reset_password') }}" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Password Baru</label>
                <input type="password" name="password" required class="block w-full p-3 bg-slate-950 border border-slate-800 rounded-xl text-white focus:outline-none focus:border-emerald-500 transition" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold p-3 rounded-xl transition">
                Simpan Password Baru
            </button>
        </form>
    </div>

</body>
</html>
